<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prediction Result</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(circle at top, #10243e 0%, #050a14 70%);
    color: #eef3fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .navbar {
    position: fixed;
    top: 0; right: 0;
    display: flex;
    gap: 24px;
    padding: 20px 40px;
  }
  .navbar a { color: #cfe0f5; text-decoration: none; font-weight: 600; }
  .card {
    max-width: 460px;
    width: 90%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 40px;
    text-align: center;
  }
  .score {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(90deg, #6fb1ff, #9b7bff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .category {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 20px;
    border-radius: 999px;
    background: rgba(111,177,255,0.15);
    color: #a7cbff;
    font-weight: 700;
  }
  .country { color: #9fb2cc; margin-top: 12px; }
  .again {
    display: inline-block;
    margin-top: 28px;
    padding: 12px 30px;
    border-radius: 999px;
    background: linear-gradient(90deg, #4f8ef7, #8b5cf6);
    color: white;
    text-decoration: none;
    font-weight: 700;
  }
  .fallback { color: #eab5b5; }
</style>
</head>
<body>
  <div class="navbar">
    <a href="/Home">Home</a>
    <a href="/Prediction">Predict</a>
  </div>

  <div class="card">
    {% if hdi_score is not none %}
      <div class="score">{{ hdi_score }}</div>
      <div class="category">{{ category }}</div>
      <p class="country">for {{ country }}</p>
    {% else %}
      <p class="fallback">{{ prediction_text }}</p>
    {% endif %}
    <div>
      <a class="again" href="/Prediction">Predict Another Country</a>
    </div>
  </div>
</body>
</html>
