<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HDI Prediction</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(circle at top, #10243e 0%, #050a14 70%);
    color: #eef3fa;
    min-height: 100vh;
  }
  .navbar {
    display: flex;
    justify-content: flex-end;
    gap: 24px;
    padding: 20px 40px;
  }
  .navbar a {
    color: #cfe0f5;
    text-decoration: none;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 8px;
  }
  .navbar a:hover { background: rgba(255,255,255,0.08); }
  h1 {
    text-align: center;
    background: linear-gradient(90deg, #6fb1ff, #9b7bff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 4px;
  }
  .subtitle { text-align: center; color: #9fb2cc; margin-bottom: 30px; }
  form.main {
    max-width: 460px;
    margin: 0 auto;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 32px;
  }
  label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.85rem;
    color: #a9bcd6;
  }
  .field { margin-bottom: 18px; }
 select, input[type="text"], input[type="number"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #eef3fa;
    font-size: 0.95rem;
  }
  select {
    color-scheme: dark;
  }
  select option {
    background: #10243e;
    color: #eef3fa;
  }
  select:focus, input:focus { outline: 2px solid #6fb1ff; }
  .hint { font-size: 0.75rem; color: #7c8daa; margin-top: 4px; }
  .logbtn {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(90deg, #4f8ef7, #8b5cf6);
    color: white;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
  }
  .logbtn:hover { opacity: 0.92; }
</style>
</head>
<body>
  <div class="navbar">
    <a href="/Home">Home</a>
    <a href="/Prediction">Predict</a>
  </div>

  <h1>Predict the HDI Score</h1>
  <p class="subtitle">Enter the indicators below to estimate a country's Human Development Index</p>

  <form class="main" action="/predict" method="post">
    <div class="field">
      <label for="Country">Country</label>
      <select id="Country" name="Country" required>
        <option value="" disabled selected>Select the name of the Country</option>
        {% for c in countries %}
        <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="field">
      <label for="life_exp">Life expectancy</label>
      <input type="number" step="0.1" min="30" max="90" id="life_exp"
             name="Life expectancy" placeholder="Enter life expectancy (range 30-89)" required>
    </div>

    <div class="field">
      <label for="mys">Mean years of schooling</label>
      <input type="number" step="0.1" min="0" max="16" id="mys"
             name="Mean years of schooling" placeholder="Enter mean years of schooling (range 0-15)" required>
    </div>

    <div class="field">
      <label for="gni">Gross national income (GNI) per capita</label>
      <input type="number" step="1" min="200" max="150000" id="gni"
             name="Gross national income (GNI) per capita" placeholder="Enter GNI per capita (range ~700-120000)" required>
      <div class="hint">In PPP $ terms</div>
    </div>

    <div class="field">
      <label for="net">Internet users</label>
      <input type="number" step="0.1" min="0" max="100" id="net"
             name="Internet users" placeholder="Enter % of population using the internet" required>
    </div>

    <button class="logbtn" type="submit">Predict</button>
  </form>
</body>
</html>
